<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Player</title>
    <link rel="stylesheet" href="files/music-player.css">
</head>
<body>

<div class="app">

    <header>
        <h1>🎵 Player</h1>
        <input type="text" id="search" placeholder="Поиск...">
    </header>

    <main>
        <ul id="trackList" class="track-list"></ul>
    </main>

</div>

<div id="player" class="player hidden">

    <div class="player-info">
        <div id="nowPlaying">Не выбрано</div>
    </div>

    <div class="player-controls">
        <button id="prev">⏮</button>
        <button id="playPause">⏯</button>
        <button id="next">⏭</button>
    </div>

    <audio id="audio"></audio>

</div>

<script src="files/music-player.js"></script>
</body>
</html>
