<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Музыкальные страницы</title>
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background: #1e293b;
            padding: 10px;
            overflow-y: auto;
        }

        .page-item {
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .page-item:hover {
            background: #334155;
        }

        .page-item.active {
            background: #3b82f6;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .track {
            margin-bottom: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
        }

        .author {
            opacity: 0.7;
            font-size: 14px;
        }

        button {
            margin-top: 10px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h3>Страницы</h3>
    <div id="pages"></div>
</div>

<div class="content" id="content">
    <h2 id="page-title">Выберите страницу</h2>
    <div id="tracks"></div>
</div>

<script>
    let currentActive = null;

    async function loadPages() {
        const res = await fetch('/music-viewer/pages');
        const pages = await res.json();

        const container = document.getElementById('pages');
        container.innerHTML = '';

        pages.forEach(page => {
            const div = document.createElement('div');
            div.className = 'page-item';
            div.innerText = page.title;

            div.onclick = () => {
                setActive(div);
                loadPage(page);
            };

            container.appendChild(div);
        });
    }

    function setActive(element) {
        if (currentActive) currentActive.classList.remove('active');
        element.classList.add('active');
        currentActive = element;
    }

    function loadPage(page) {
        document.getElementById('page-title').innerText = page.title;

        const tracksContainer = document.getElementById('tracks');
        tracksContainer.innerHTML = '';

        page.tracks.forEach((track, index) => {
            const trackDiv = document.createElement('div');
            trackDiv.className = 'track';

            const title = document.createElement('h4');
            title.innerText = track.title;

            const author = document.createElement('div');
            author.className = 'author';
            author.innerText = (track.authors || []).join(', ');

            const waveformDiv = document.createElement('div');
            waveformDiv.id = 'wave-' + index;

            const button = document.createElement('button');
            button.innerText = 'Play / Pause';

            trackDiv.appendChild(title);
            trackDiv.appendChild(author);
            trackDiv.appendChild(waveformDiv);
            trackDiv.appendChild(button);
            tracksContainer.appendChild(trackDiv);

            const wavesurfer = WaveSurfer.create({
                container: waveformDiv,
                waveColor: '#94a3b8',
                progressColor: '#3b82f6',
                height: 80
            });

            wavesurfer.load('/music-viewer/track/' + track.file);

            button.onclick = () => wavesurfer.playPause();
        });
    }

    loadPages();
</script>
</body>
</html>
