<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестик</title>

    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --border: #e5e7eb;
            --text: #111827;
            --secondary: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background: var(--bg);
            font-family:
                    Inter,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            color: var(--text);
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: -1px;
        }

        .question {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            transition:
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
        }

        .question:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
        }

        .question-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 18px;
            line-height: 1.4;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
            transition:
                    border-color 0.2s ease,
                    box-shadow 0.2s ease;
            background: #fafafa;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
            background: white;
        }

        button {
            margin-top: 16px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition:
                    background 0.2s ease,
                    transform 0.15s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
        }

        .right {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
            border: 1px solid rgba(22, 163, 74, 0.2);
        }

        .wrong {
            background: rgba(220, 38, 38, 0.08);
            color: var(--error);
            border: 1px solid rgba(220, 38, 38, 0.15);
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 14px;
            }

            h1 {
                font-size: 32px;
            }

            .question {
                padding: 20px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>

<h1>Тест</h1>

<div id="questions"></div>

<script>
    async function loadQuestions() {
        const response = await fetch('/api/test/questions');
        const questions = await response.json();

        const container = document.getElementById('questions');

        questions.forEach(q => {
            const div = document.createElement('div');
            div.className = 'question';

            div.innerHTML = `
                <div class="question-title">${q.question}</div>

                <input type="text" id="answer-${q.index}"placeholder="Введите ответ..."/>

                <button onclick="submitAnswer(${q.index})">
                    Проверить
                </button>

                <div class="result" id="result-${q.index}"></div>
            `;



            container.appendChild(div);
        });
    }

    async function submitAnswer(questionIndex) {
        const answer = document.getElementById(`answer-${questionIndex}`).value;

        const response = await fetch('/api/test/answer', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                questionIndex,
                answer
            })
        });

        const result = await response.json();

        const resultDiv = document.getElementById(`result-${questionIndex}`);

        if (result.isRight) {
            resultDiv.className = 'result right';
            resultDiv.innerText = `Правильно (${result.rightAnswer})`;
        } else {
            resultDiv.className = 'result wrong';
            resultDiv.innerText = `Неправильно. Правильный ответ: ${result.rightAnswer}`;
        }
    }

    loadQuestions();
</script>

</body>
</html>
